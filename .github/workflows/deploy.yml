name: Deploy PMOi Tareas

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inyectar BUILD_VERSION en sw.js
        run: |
          BUILD_VERSION=$(date -u +"%Y%m%d%H%M%S")
          sed -i "s/__BUILD_VERSION__/$BUILD_VERSION/g" sw.js

      - name: Commit sw.js actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --cached --quiet || git commit -m "chore: actualizar BUILD_VERSION en sw.js [skip ci]"
          git push
